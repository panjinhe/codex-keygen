<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Keygen</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local OAuth Tool</p>
          <h1>Codex Keygen</h1>
        </div>
        <div class="status-pill" id="status-pill">未检测到凭证</div>
      </header>

      <main class="workspace">
        <section class="panel primary-panel" aria-labelledby="auth-title">
          <div class="section-head">
            <div>
              <h2 id="auth-title">生成渠道密钥</h2>
              <p>在本机完成 OpenAI Codex OAuth，结果保存为 new-api 可直接使用的 JSON。</p>
            </div>
          </div>

          <div class="actions">
            <button class="button primary" id="start-auth">打开授权页面</button>
            <button class="button" id="load-key">读取 JSON</button>
            <button class="button" id="refresh-key">刷新凭证</button>
          </div>

          <div class="notice">
            <strong>保存格式</strong>
            <span id="key-file">secrets/codex-channel-key.json</span>
          </div>

          <div class="notice warning">
            <strong>账号保护</strong>
            <span>这个 JSON 含有 refresh_token，只放在本机使用，不要提交 git 或发给别人。</span>
          </div>

          <div class="log" id="message">等待操作。</div>
        </section>

        <section class="panel detail-panel" aria-labelledby="key-title">
          <div class="section-head compact">
            <div>
              <h2 id="key-title">已保存凭证</h2>
              <p>复制整段 JSON 到 Codex 渠道密钥。</p>
            </div>
            <button class="button small" id="copy-key" disabled>复制 JSON</button>
          </div>

          <dl class="summary" id="summary">
            <div>
              <dt>Account</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>Email</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>Expires</dt>
              <dd>-</dd>
            </div>
            <div>
              <dt>Last refresh</dt>
              <dd>-</dd>
            </div>
          </dl>

          <textarea id="key-json" spellcheck="false" readonly placeholder="生成或读取后会显示 JSON"></textarea>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
